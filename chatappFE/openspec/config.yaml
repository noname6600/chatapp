schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  PROJECT: Real-time chat application with friends, rooms, direct messaging, presence, notifications, and user profiles
  
  TECH STACK:
  - Frontend: React 19.2, TypeScript 5.9, Vite 7.2
  - Styling: Tailwind CSS 4.1 (no custom CSS files)
  - State Management: Zustand 5.0
  - HTTP Client: Axios 1.13 with axios-auth-refresh for token refresh
  - Data Fetching: React Query (TanStack Query) 5.90
  - Real-time: Socket.io-client 4.8.3
  - Routing: React Router DOM 7.13
  - UI Icons: Lucide React 0.577
  - Utilities: dayjs, clsx, uuid, react-easy-crop
  - Linting: ESLint 9 with TypeScript support
  
  PROJECT STRUCTURE & CONVENTIONS:
  - Feature-based folder architecture under /features (chats, rooms, etc.)
  - API layer abstraction: /api folder with .api.ts (HTTP endpoints) and .service.ts (business logic)
  - Component organization: Organized by domain (chat, friend, layout, presence, profile, user)
  - State management: Zustand stores in /store (auth.store, chat.store, room.store, etc.)
  - Custom hooks in /hooks and /features/*/hooks
  - WebSocket handlers: /websocket folder (presence.socket, chat.socket, presence.listener)
  - Type definitions in /types with domain-specific types
  - Pages in /pages, Layouts in /layouts, Routes in /routes
  
  NAMING CONVENTIONS:
  - Components: PascalCase (.tsx files) for React components
  - Functions/utilities: camelCase for functions, const declarations
  - Files: camelCase for non-component files (.ts, .tsx services, utils, hooks)
  - Store files: named.store.tsx
  - API files: named.api.ts (HTTP calls), named.service.ts (business logic)
  - Socket/event files: eventName.socket.ts or eventName.listener.ts
  - Type files: (plural) domain.ts (e.g., user.ts, room.ts, message.ts)
  - Query/mutation hooks: named.ts with 'use' prefix
  
  BUILD & DEV:
  - Build tool: Vite with React plugin
  - Dev server: npm run dev
  - Build: npm run build (TypeScript check + Vite build)
  - Preview: npm run preview
  - Linting: npm run lint (ESLint)
  - Module type: ES modules
  
  ARCHITECTURAL PATTERNS:
  - API layer provides abstraction between components and HTTP calls
  - Zustand stores manage global application state (auth, chat, friends, presence, rooms)
  - WebSocket events handled separately from HTTP API calls
  - Real-time presence tracking with socket listeners
  - RESTful API client with interceptors for auth token refresh

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  proposal:
    - Focus on feature-based scope
    - Include WebSocket event requirements for real-time features
    - Specify which Zustand store(s) are involved
  tasks:
    - Break tasks into components and API work separately
    - Include type definition tasks for new domains
    - Estimate 2-4 hour maximum for each task
    - Include testing implications
  specs:
    - Document API endpoints and WebSocket events
    - Include Zustand store structure for state changes
    - Specify component hierarchy and data flow
