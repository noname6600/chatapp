server:
  port: ${PORT:8083}

spring:
  application:
    name: chat-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: chat-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  # ======================
  # DATABASE (PostgreSQL)
  # ======================
  datasource:
    url: ${CHAT_DATABASE_URL:jdbc:postgresql://localhost:5434/chat_service}
    username: ${CHAT_DATABASE_USER:chat_user}
    password: ${CHAT_DATABASE_PASSWORD:chat_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}




# ======================
# ACTUATOR
# ======================
management:
  endpoints:
    web:
      exposure:
        include: health,info


common:
  security:
    cors:
      allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}"
      allowed-methods: "*"
      allowed-headers: "*"


cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dblxoplvg}
  api-key: ${CLOUDINARY_API_KEY:877947325938691}
  api-secret: ${CLOUDINARY_API_SECRET:KfHivMv0wUQ9D-89rVx8Wu5U12w}

services:
  user:
    url: ${SERVICES_USER_URL:http://localhost:8082}
  friendship:
    url: ${SERVICES_FRIENDSHIP_URL:http://localhost:8085}

logging:
