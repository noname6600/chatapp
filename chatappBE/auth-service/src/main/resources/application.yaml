server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: 2000
        delivery.timeout.ms: 3000
        request.timeout.ms: 2000

  datasource:
    url: ${AUTH_DATABASE_URL:jdbc:postgresql://localhost:5432/auth_service}
    username: ${AUTH_DATABASE_USER:auth_user}
    password: ${AUTH_DATABASE_PASSWORD:auth_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM}
  base-url: ${RESEND_BASE_URL:https://api.resend.com}

security:
  oauth2:
    client:
      registration:
        google:
          client-id: ${GOOGLE_CLIENT_ID}
          client-secret: ${GOOGLE_CLIENT_SECRET}
          scope: email,profile
      provider:
        google:
          authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
          token-uri: https://oauth2.googleapis.com/token
          user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
          user-name-attribute: email

auth:
  jwt:
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 2592000000

  signing-key:
    algorithm: RSA
    key-size: 2048
    rotation-ms: 86400000
    grace-period-ms: 1800000

app:
  frontend:
    reset-password-url: ${FRONTEND_URL:http://localhost:5173}

user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082/api/v1/users}

management:
  endpoints:
    web:
      exposure:
        include: health,info

common:
  security:
    cors:
      allowed-origins:
        - ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId}]"
