spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:h2:mem:auth-service-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092

auth:
  jwt:
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 2592000000

  signing-key:
    rotation-ms: 86400000

common:
  security:
    cors:
      allowed-origins: http://localhost:5173
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"

security:
  oauth2:
    client:
      registration:
        google:
          client-id: test-google-client-id
          client-secret: test-google-client-secret

resend:
  api-key: test-resend-key
  from: no-reply@test.local
  base-url: http://localhost

MASTER_DATABASE_URL: jdbc:h2:mem:ignored
MASTER_DATABASE_USER: sa
MASTER_DATABASE_PWD:
GOOGLE_CLIENT_ID: test-google-client-id
GOOGLE_CLIENT_SECRET: test-google-client-secret
