server:
  port: ${PORT:8088}

spring:
  application:
    name: upload-service

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info

common:
  security:
    cors:
      allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}"
      allowed-methods: "*"
      allowed-headers: "*"

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dblxoplvg}
  api-key: ${CLOUDINARY_API_KEY:877947325938691}
  api-secret: ${CLOUDINARY_API_SECRET:KfHivMv0wUQ9D-89rVx8Wu5U12w}

upload:
  policy:
    chat-attachment:
      folder: chat/attachments
      max-bytes: 10485760
      allowed-formats: [jpg, jpeg, png, gif, webp, mp4, mov, avi, mkv, pdf, doc, docx, txt]
      allowed-resource-types: [image, video, raw]
    user-avatar:
      folder: user/avatar
      max-bytes: 5242880
      allowed-formats: [jpg, jpeg, png, webp]
      allowed-resource-types: [image]

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId}]"
