# ─── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────────
server {
    listen 80;
    server_name chatweb.nani.id.vn api.chatweb.nani.id.vn;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: Frontend — chatweb.nani.id.vn ─────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name chatweb.nani.id.vn;

    ssl_certificate     /etc/letsencrypt/live/chatweb.nani.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatweb.nani.id.vn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── HTTPS: Backend API + WebSocket — api.chatweb.nani.id.vn ──────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.chatweb.nani.id.vn;

    ssl_certificate     /etc/letsencrypt/live/api.chatweb.nani.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.chatweb.nani.id.vn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket proxy — pass upgrade headers so gateway can handle /ws/**
    location /ws/ {
        proxy_pass             http://gateway-service:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP          $remote_addr;
        proxy_set_header       X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto  $scheme;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # REST API proxy — do NOT add CORS headers here; gateway handles CORS policy
    location / {
        proxy_pass           http://gateway-service:8080;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
    }
}
