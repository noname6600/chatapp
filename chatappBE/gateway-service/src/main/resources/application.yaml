server:
  port: ${PORT:8080}
  forward-headers-strategy: native

spring:
  application:
    name: gateway-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}/.well-known/jwks.json

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 5s

      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                deny-empty-key: false
                key-resolver: "#{@ipKeyResolver}"

          routes:
            - id: auth-service
              uri: http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}
              predicates:
                - Path=/api/v1/auth/**,/api/auth/**,/oauth2/authorization/**,/login/oauth2/code/**
              filters:
                - RewritePath=/api/auth/?(?<segment>.*), /api/v1/auth/${segment}
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE

            - id: user-service
              uri: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8082}
              predicates:
                - Path=/api/v1/users/**,/api/users/**
              filters:
                - RewritePath=/api/users/?(?<segment>.*), /api/v1/users/${segment}
                - JwtAuthFilter
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                - name: CircuitBreaker
                  args:
                    name: user-cb
                    fallbackUri: forward:/fallback/service-unavailable

            - id: chat-service
              uri: http://${CHAT_SERVICE_HOST:localhost}:${CHAT_SERVICE_PORT:8083}
              predicates:
                - Path=/api/v1/chat/**,/api/chat/**,/api/v1/rooms/**,/api/rooms/**,/api/v1/messages/**,/api/messages/**
              filters:
                - RewritePath=/api(?:/v1)?/chat/?(?<segment>.*), /api/v1/${segment}
                - RewritePath=/api/rooms/?(?<segment>.*), /api/v1/rooms/${segment}
                - RewritePath=/api/messages/?(?<segment>.*), /api/v1/messages/${segment}
                - JwtAuthFilter
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                - name: CircuitBreaker
                  args:
                    name: chat-cb
                    fallbackUri: forward:/fallback/service-unavailable

            - id: chat-service-ws
              uri: ws://${CHAT_SERVICE_HOST:localhost}:${CHAT_SERVICE_PORT:8083}
              predicates:
                - Path=/ws/chat/**

            - id: presence-service
              uri: http://${PRESENCE_SERVICE_HOST:localhost}:${PRESENCE_SERVICE_PORT:8084}
              predicates:
                - Path=/api/v1/presence/**,/api/presence/**
              filters:
                - RewritePath=/api/presence/?(?<segment>.*), /api/v1/presence/${segment}
                - JwtAuthFilter
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                - name: CircuitBreaker
                  args:
                    name: presence-cb
                    fallbackUri: forward:/fallback/service-unavailable

            - id: presence-service-ws
              uri: ws://${PRESENCE_SERVICE_HOST:localhost}:${PRESENCE_SERVICE_PORT:8084}
              predicates:
                - Path=/ws/presence/**

            - id: friendship-service
              uri: http://${FRIENDSHIP_SERVICE_HOST:localhost}:${FRIENDSHIP_SERVICE_PORT:8085}
              predicates:
                - Path=/api/v1/friendship/**,/api/friendship/**
              filters:
                - RewritePath=/api(?:/v1)?/friendship/?(?<segment>.*), /api/v1/${segment}
                - JwtAuthFilter
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                - name: CircuitBreaker
                  args:
                    name: friendship-cb
                    fallbackUri: forward:/fallback/service-unavailable

            - id: friendship-service-ws
              uri: ws://${FRIENDSHIP_SERVICE_HOST:localhost}:${FRIENDSHIP_SERVICE_PORT:8085}
              predicates:
                - Path=/ws/friendship/**

            - id: notification-service
              uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:${NOTIFICATION_SERVICE_PORT:8086}
              predicates:
                - Path=/api/v1/notifications/**,/api/notifications/**
              filters:
                - RewritePath=/api/notifications/?(?<segment>.*), /api/v1/notifications/${segment}
                - JwtAuthFilter
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                - name: CircuitBreaker
                  args:
                    name: notification-cb
                    fallbackUri: forward:/fallback/service-unavailable

            - id: notification-service-ws
              uri: ws://${NOTIFICATION_SERVICE_HOST:localhost}:${NOTIFICATION_SERVICE_PORT:8086}
              predicates:
                - Path=/ws/notifications/**

            - id: upload-service
              uri: http://${UPLOAD_SERVICE_HOST:localhost}:${UPLOAD_SERVICE_PORT:8088}
              predicates:
                - Path=/api/v1/upload/**,/api/upload/**
              filters:
                - RewritePath=/api(?:/v1)?/upload/?(?<segment>.*), /api/v1/${segment}
                - JwtAuthFilter
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                - name: CircuitBreaker
                  args:
                    name: upload-cb
                    fallbackUri: forward:/fallback/service-unavailable

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      user-cb:
        baseConfig: default
      chat-cb:
        baseConfig: default
      presence-cb:
        baseConfig: default
      friendship-cb:
        baseConfig: default
      notification-cb:
        baseConfig: default
      upload-cb:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
    instances:
      user-cb:
        baseConfig: default
      chat-cb:
        baseConfig: default
      presence-cb:
        baseConfig: default
      friendship-cb:
        baseConfig: default
      notification-cb:
        baseConfig: default
      upload-cb:
        baseConfig: default

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,downstreamRoutes
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

gateway:
  readiness:
    enabled: true
    health-path: /actuator/health
    timeout: 2s
    required-services:
      - http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}
      - http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8082}
      - http://${CHAT_SERVICE_HOST:localhost}:${CHAT_SERVICE_PORT:8083}
      - http://${PRESENCE_SERVICE_HOST:localhost}:${PRESENCE_SERVICE_PORT:8084}
      - http://${FRIENDSHIP_SERVICE_HOST:localhost}:${FRIENDSHIP_SERVICE_PORT:8085}
      - http://${NOTIFICATION_SERVICE_HOST:localhost}:${NOTIFICATION_SERVICE_PORT:8086}
      - http://${UPLOAD_SERVICE_HOST:localhost}:${UPLOAD_SERVICE_PORT:8088}

  security:
    jwt:
      clock-skew-seconds: ${GATEWAY_JWT_CLOCK_SKEW_SECONDS:60}

common:
  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      allowed-headers:
        - "*"